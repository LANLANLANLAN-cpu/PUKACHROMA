<script src="script.js"></script>

<script type="module">
  import { getCurrentUser, getMyProfile, ensureProfile, signOutUser } from './auth.js'
  import { renderCartCount } from './cart.js'

  const accountCard = document.getElementById('accountCard')
  const logoutButton = document.getElementById('logoutButton')

  async function loadAccount() {
    try {
      const user = await getCurrentUser()

      if (!user) {
        accountCard.innerHTML = 'You are not logged in.'
        return
      }

      let profile = await getMyProfile()

      if (!profile) {
        const fallbackName =
          user.user_metadata?.display_name ||
          user.email?.split('@')[0] ||
          ''

        await ensureProfile(user, fallbackName)
        profile = await getMyProfile()
      }

      accountCard.innerHTML = `
        <p><strong>Email:</strong> ${profile?.email || user.email || ''}</p>
        <br>
        <p><strong>Display Name:</strong> ${profile?.display_name || ''}</p>
        <br>
        <p><strong>Role:</strong> ${profile?.role || 'user'}</p>
      `
    } catch (error) {
      console.error(error)
      accountCard.innerHTML = `
        <p>Failed to load account.</p>
        <br>
        <p>${error.message || 'Unknown error'}</p>
      `
    }
  }

  logoutButton.addEventListener('click', async () => {
    try {
      await signOutUser()
      window.location.href = 'login.html'
    } catch (error) {
      console.error(error)
      alert('Failed to log out.')
    }
  })

  loadAccount()
  renderCartCount()
</script>
