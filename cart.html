  <section class="cart-page-wrap">
    <h1 class="cart-page-title">Cart</h1>

    <div id="cartList" class="cart-list"></div>

    <div id="cartTotalBox" class="cart-total-box" style="display:none;"></div>
  </section>

</div>

<script src="script.js"></script>

<script type="module">
  import { getCurrentUser } from './auth.js'
  import { getMyCartItems, removeCartItem, updateCartItemQuantity, renderCartCount } from './cart.js'
  import { formatPrice } from './shop-data.js'

  const cartList = document.getElementById('cartList')
  const cartTotalBox = document.getElementById('cartTotalBox')

  function escapeHtml(text = '') {
    return String(text)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;')
  }

  function calcTotal(items) {
    return items.reduce((sum, item) => {
      const price = Number(item.products?.price || 0)
      const qty = Number(item.quantity || 0)
      return sum + price * qty
    }, 0)
  }

  async function loadCart() {
    const user = await getCurrentUser()

    if (!user) {
      cartList.innerHTML = '<p>Please log in to view your cart.</p>'
      cartTotalBox.style.display = 'none'
      return
    }

    try {
      const items = await getMyCartItems()

      if (!items || items.length === 0) {
        cartList.innerHTML = '<p>Your cart is empty.</p>'
        cartTotalBox.style.display = 'none'
        await renderCartCount()
        return
      }

      cartList.innerHTML = items.map(item => {
        const product = item.products || {}
        const image = product.cover_image || 'https://via.placeholder.com/400x400'
        const lineTotal = Number(product.price || 0) * Number(item.quantity || 0)

        return `
          <div class="cart-item-card" data-cart-item-id="${item.id}">
            <img src="${image}" alt="${escapeHtml(product.name || '')}" class="cart-item-image">

            <div class="cart-item-main">
              <h3>${escapeHtml(product.name || '')}</h3>
              <p>${formatPrice(product.price)}</p>
              <p>Category: ${escapeHtml(product.category || '')}</p>
              <p>Purchase: ${escapeHtml(product.purchase_method || '')}</p>
              <p>Line Total: ${formatPrice(lineTotal)}</p>
            </div>

            <div class="cart-item-actions">
              <div class="quantity-row">
                <button class="small-action-button decrease-btn" data-id="${item.id}" data-qty="${item.quantity}">-</button>
                <span>${item.quantity}</span>
                <button class="small-action-button increase-btn" data-id="${item.id}" data-qty="${item.quantity}">+</button>
              </div>

              <button class="small-action-button remove-btn" data-id="${item.id}">
                Remove
              </button>

              <a class="small-action-button" href="product.html?id=${product.id}">
                View Product
              </a>
            </div>
          </div>
        `
      }).join('')

      const total = calcTotal(items)
      cartTotalBox.style.display = 'block'
      cartTotalBox.textContent = `Total: ${formatPrice(total)}`

      bindCartButtons()
      await renderCartCount()

    } catch (error) {
      console.error(error)
      cartList.innerHTML = `<p>Failed to load cart.</p><p>${error.message || ''}</p>`
      cartTotalBox.style.display = 'none'
    }
  }

  function bindCartButtons() {
    document.querySelectorAll('.remove-btn').forEach(button => {
      button.addEventListener('click', async () => {
        const id = button.getAttribute('data-id')
        await removeCartItem(id)
        await loadCart()
      })
    })

    document.querySelectorAll('.increase-btn').forEach(button => {
      button.addEventListener('click', async () => {
        const id = button.getAttribute('data-id')
        const qty = Number(button.getAttribute('data-qty') || 0)
        await updateCartItemQuantity(id, qty + 1)
        await loadCart()
      })
    })

    document.querySelectorAll('.decrease-btn').forEach(button => {
      button.addEventListener('click', async () => {
        const id = button.getAttribute('data-id')
        const qty = Number(button.getAttribute('data-qty') || 0)
        await updateCartItemQuantity(id, qty - 1)
        await loadCart()
      })
    })
  }

  loadCart()
</script>

</body>
</html>
