<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Log In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <header class="navbar">
    <div class="nav-side nav-left">
      <nav class="nav-links">
        <a href="index.html">Home</a>
      </nav>
    </div>

    <a href="index.html" class="logo">Logo</a>

    <div class="nav-side nav-right">
      <nav class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="login.html">Log In</a>
      </nav>
    </div>
  </header>

  <section class="content-page">
    <div class="content-wrap">
      <h1>Admin Log In</h1>

      <div class="card dark">
        <form class="login-form" id="adminLoginForm">
          <input type="email" id="adminEmail" placeholder="Admin Email" required />
          <input type="password" id="adminPassword" placeholder="Password" required />
          <button type="submit">Log In</button>
        </form>

        <p id="adminLoginMessage" style="margin-top:16px;"></p>
      </div>
    </div>
  </section>

</div>

<script type="module">
  import { signInWithEmail, getMyProfile } from './auth.js'

  const form = document.getElementById('adminLoginForm')
  const message = document.getElementById('adminLoginMessage')

  form.addEventListener('submit', async (event) => {
    event.preventDefault()
    message.textContent = ''

    const email = document.getElementById('adminEmail').value.trim()
    const password = document.getElementById('adminPassword').value

    try {
      await signInWithEmail({ email, password })
      const profile = await getMyProfile()

      if (!profile || !['admin', 'owner'].includes(profile.role)) {
        message.textContent = 'This account is not an admin account.'
        return
      }

      window.location.href = 'admin-products.html'
    } catch (error) {
      console.error(error)
      message.textContent = error.message || 'Admin log in failed.'
    }
  })
</script>

</body>
</html>
