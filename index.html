<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puka☆Chroma</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="page">

  <!-- HERO -->
  <header class="hero">

    <div class="navbar">
      <div class="nav-left">
        <div class="menu-icon">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <a href="#about">About Us</a>
        <a href="#schedule">Schedule</a>
      </div>

      <div class="logo">Logo</div>

      <div class="nav-right">
        <a href="#shop">Shop</a>
        <a href="#contact">Contact Us</a>
        <a href="#login">log in</a>
      </div>
    </div>

    <div class="hero-center">
      <div class="hero-box">
        <p>Group photo as back ground</p>
        <h1>Puka☆Chroma</h1>
      </div>
    </div>

  </header>

  <!-- INFO -->
  <section class="info">
    <a class="secret" href="#about">Find your Deep sea Secret</a>

    <h2 class="event-title">Event List</h2>

    <div class="event">TBD</div>
  </section>

  <!-- CONTENT -->
  <section id="about" class="content">
    <h2>About Us</h2>
    <div class="card light">Replace with your group intro</div>
  </section>

  <section id="schedule" class="content">
    <h2>Schedule</h2>
    <div class="card dark">Events here</div>
  </section>

  <section id="shop" class="content">
    <h2>Shop</h2>
    <div class="card mid">Products</div>
  </section>

  <section id="contact" class="content">
    <h2>Contact Us</h2>
    <div class="card light">Contact info</div>
  </section>

  <section id="login" class="content">
    <h2>Log In</h2>
    <div class="card dark">
      <form>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Log In</button>
      </form>
    </div>
  </section>

</div>

</body>
</html>
