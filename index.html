<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puka☆Chroma</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="nav-left">
      <div class="menu-icon">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <a href="#about">About Us</a>
      <a href="#schedule">Schedule</a>
    </div>

    <div class="logo">Logo</div>

    <div class="nav-right">
      <a href="#shop">Shop</a>
      <a href="#contact">Contact Us</a>
      <a href="#login">log in</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-box">
      <p>Group photo as back ground</p>
      <h1>Puka☆Chroma</h1>
    </div>
  </div>

  <!-- SCROLL -->
  <div class="scroll">Scroll down</div>

  <!-- INFO -->
  <div class="info">
    <a class="secret" href="#about">Find your Deep sea Secret</a>
    <h2>Event List</h2>
    <div class="event">TBD</div>
  </div>

  <!-- ABOUT -->
  <section id="about">
    <h2>About Us</h2>
    <div class="card light">
      Replace with your group introduction.
    </div>
  </section>

  <!-- SCHEDULE -->
  <section id="schedule">
    <h2>Schedule</h2>
    <div class="card dark">
      Add your events here.
    </div>
  </section>

  <!-- SHOP -->
  <section id="shop">
    <h2>Shop</h2>
    <div class="card mid">
      Add products here.
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <h2>Contact Us</h2>
    <div class="card light">
      Add contact info here.
    </div>
  </section>

  <!-- LOGIN -->
  <section id="login">
    <h2>Log In</h2>
    <div class="card dark">
      <form>
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">
        <button>Log In</button>
      </form>
    </div>
  </section>

</div>

</body>
</html>
