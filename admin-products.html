<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Products</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <header class="navbar">
    <div class="nav-side nav-left">
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
      </nav>
    </div>

    <a href="index.html" class="logo">Logo</a>

    <div class="nav-side nav-right">
      <nav class="nav-links">
        <a href="my-account.html">My Account</a>
      </nav>
    </div>
  </header>

  <section class="content-page">
    <div class="content-wrap">
      <h1>Admin Products</h1>

      <div class="card dark" style="margin-bottom: 32px;">
        <form class="login-form" id="productForm">
          <input type="hidden" id="productId" />

          <input type="text" id="name" placeholder="Product Name" required />
          <input type="number" id="price" placeholder="Price" step="0.01" />
          <textarea id="description" placeholder="Description" style="padding:14px 16px; min-height:120px;"></textarea>
          <input type="text" id="size" placeholder="Size" />
          <input type="number" id="stock" placeholder="Stock" />
          <input type="text" id="category" placeholder="Category (example: lanlan or lanlan,group)" />
          
          <label>Cover Image File</label>
          <input type="file" id="coverFile" accept="image/*" />

          <label>Extra Images</label>
          <input type="file" id="extraFiles" accept="image/*" multiple />

          <input type="text" id="youtube_url" placeholder="YouTube URL" />
          <input type="text" id="purchase_method" placeholder="Purchase Method" />
          <input type="text" id="purchase_link" placeholder="Purchase Link" />
          <input type="text" id="status" placeholder="Status (active / draft / sold_out / hidden)" />

          <button type="submit" id="saveButton">Save Product</button>
        </form>

        <div style="margin-top: 16px; display:flex; gap:12px; flex-wrap:wrap;">
          <button id="resetFormButton" style="padding:12px 18px; border:none; cursor:pointer;">Reset Form</button>
          <button id="logoutAdminButton" style="padding:12px 18px; border:none; cursor:pointer;">Log Out</button>
        </div>

        <p id="adminMessage" style="margin-top:16px;"></p>
      </div>

      <div class="card light">
        <h2 style="margin-bottom: 20px;">All Products</h2>
        <div id="adminProductsList"></div>
      </div>
    </div>
  </section>

</div>

<script type="module">
  import { supabase } from './supabase.js'
  import { getCurrentUser, getMyProfile, signOutUser } from './auth.js'
  import { normalizeImages, formatPrice } from './shop-data.js'

  const productForm = document.getElementById('productForm')
  const adminMessage = document.getElementById('adminMessage')
  const adminProductsList = document.getElementById('adminProductsList')
  const resetFormButton = document.getElementById('resetFormButton')
  const logoutAdminButton = document.getElementById('logoutAdminButton')

  async function requireAdmin() {
    const user = await getCurrentUser()
    if (!user) {
      window.location.href = 'admin-login.html'
      return null
    }

    const profile = await getMyProfile()
    if (!profile || !['admin', 'owner'].includes(profile.role)) {
      alert('You do not have admin access.')
      window.location.href = 'index.html'
      return null
    }

    return { user, profile }
  }

  async function uploadImage(file, folder = 'products') {
    if (!file) return null

    const fileExt = file.name.split('.').pop()
    const fileName = `${folder}/${Date.now()}-${Math.random().toString(36).slice(2)}.${fileExt}`

    const { error } = await supabase.storage
      .from('images')
      .upload(fileName, file)

    if (error) throw error

    const { data } = supabase.storage
      .from('images')
      .getPublicUrl(fileName)

    return data.publicUrl
  }

  async function uploadMultipleImages(fileList, folder = 'products') {
    const files = Array.from(fileList || [])
    const urls = []

    for (const file of files) {
      const url = await uploadImage(file, folder)
      if (url) urls.push(url)
    }

    return urls
  }

  function escapeHtml(text = '') {
    return String(text)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;')
  }

  function fillForm(product) {
    document.getElementById('productId').value = product.id || ''
    document.getElementById('name').value = product.name || ''
    document.getElementById('price').value = product.price ?? ''
    document.getElementById('description').value = product.description || ''
    document.getElementById('size').value = product.size || ''
    document.getElementById('stock').value = product.stock ?? ''
    document.getElementById('category').value = product.category || ''
    document.getElementById('youtube_url').value = product.youtube_url || ''
    document.getElementById('purchase_method').value = product.purchase_method || ''
    document.getElementById('purchase_link').value = product.purchase_link || ''
    document.getElementById('status').value = product.status || ''
  }

  function resetForm() {
    productForm.reset()
    document.getElementById('productId').value = ''
  }

  async function loadProducts() {
    const { data, error } = await supabase
      .from('products')
      .select('*')
      .order('created_at', { ascending: false })

    if (error) {
      adminProductsList.innerHTML = `<p>${error.message}</p>`
      return
    }

    if (!data || data.length === 0) {
      adminProductsList.innerHTML = '<p>No products yet.</p>'
      return
    }

    adminProductsList.innerHTML = data.map(product => {
      const images = normalizeImages(product.images, product.cover_image)
      return `
        <div style="display:grid; grid-template-columns:120px 1fr auto; gap:20px; margin-bottom:20px; padding:16px; border:1px solid #ccc;">
          <img src="${images[0]}" alt="${escapeHtml(product.name || '')}" style="width:120px; height:120px; object-fit:cover; background:#ddd;">
          
          <div>
            <h3 style="margin-bottom:10px;">${escapeHtml(product.name || '')}</h3>
            <p style="margin-bottom:6px;">${formatPrice(product.price)}</p>
            <p style="margin-bottom:6px;">Category: ${escapeHtml(product.category || '')}</p>
            <p style="margin-bottom:6px;">Status: ${escapeHtml(product.status || '')}</p>
            <p style="margin-bottom:6px;">Stock: ${product.stock ?? ''}</p>
          </div>

          <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="edit-product-btn" data-id="${product.id}" style="padding:10px 12px; border:none; cursor:pointer;">Edit</button>
            <button class="delete-product-btn" data-id="${product.id}" style="padding:10px 12px; border:none; cursor:pointer;">Delete</button>
          </div>
        </div>
      `
    }).join('')

    bindAdminButtons(data)
  }

  function bindAdminButtons(products) {
    document.querySelectorAll('.edit-product-btn').forEach(button => {
      button.addEventListener('click', () => {
        const id = Number(button.getAttribute('data-id'))
        const product = products.find(item => Number(item.id) === id)
        if (product) {
          fillForm(product)
          window.scrollTo({ top: 0, behavior: 'smooth' })
        }
      })
    })

    document.querySelectorAll('.delete-product-btn').forEach(button => {
      button.addEventListener('click', async () => {
        const id = Number(button.getAttribute('data-id'))
        const yes = confirm('Delete this product?')
        if (!yes) return

        try {
          const { error } = await supabase
            .from('products')
            .delete()
            .eq('id', id)

          if (error) throw error

          adminMessage.textContent = 'Product deleted.'
          await loadProducts()
        } catch (error) {
          console.error(error)
          adminMessage.textContent = error.message || 'Delete failed.'
        }
      })
    })
  }

  productForm.addEventListener('submit', async (event) => {
    event.preventDefault()
    adminMessage.textContent = ''

    try {
      const productId = document.getElementById('productId').value
      const name = document.getElementById('name').value.trim()
      const price = document.getElementById('price').value
      const description = document.getElementById('description').value.trim()
      const size = document.getElementById('size').value.trim()
      const stock = document.getElementById('stock').value
      const category = document.getElementById('category').value.trim().toLowerCase()
      const youtube_url = document.getElementById('youtube_url').value.trim()
      const purchase_method = document.getElementById('purchase_method').value.trim()
      const purchase_link = document.getElementById('purchase_link').value.trim()
      const status = document.getElementById('status').value.trim().toLowerCase() || 'draft'

      const coverFile = document.getElementById('coverFile').files[0]
      const extraFiles = document.getElementById('extraFiles').files

      let cover_image = null
      if (coverFile) {
        cover_image = await uploadImage(coverFile, 'product-cover')
      }

      const extraImageUrls = await uploadMultipleImages(extraFiles, 'product-gallery')

      const payload = {
        name,
        price: price ? Number(price) : null,
        description,
        size,
        stock: stock ? Number(stock) : 0,
        category,
        youtube_url,
        purchase_method,
        purchase_link,
        status,
        updated_at: new Date().toISOString()
      }

      if (cover_image) {
        payload.cover_image = cover_image
      }

      if (extraImageUrls.length > 0) {
        payload.images = extraImageUrls
      }

      if (productId) {
        const { error } = await supabase
          .from('products')
          .update(payload)
          .eq('id', productId)

        if (error) throw error
        adminMessage.textContent = 'Product updated.'
      } else {
        if (!payload.cover_image) {
          payload.cover_image = 'https://via.placeholder.com/700x700'
        }

        if (!payload.images) {
          payload.images = [payload.cover_image]
        }

        const { error } = await supabase
          .from('products')
          .insert(payload)

        if (error) throw error
        adminMessage.textContent = 'Product created.'
      }

      resetForm()
      await loadProducts()

    } catch (error) {
      console.error(error)
      adminMessage.textContent = error.message || 'Save failed.'
    }
  })

  resetFormButton.addEventListener('click', () => {
    resetForm()
    adminMessage.textContent = ''
  })

  logoutAdminButton.addEventListener('click', async () => {
    await signOutUser()
    window.location.href = 'admin-login.html'
  })

  await requireAdmin()
  await loadProducts()
</script>

</body>
</html>
