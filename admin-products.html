<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Products</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page">

  <header class="navbar">
    <div class="nav-side nav-left">
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
      </nav>
    </div>

    <a href="index.html" class="logo">Logo</a>

    <div class="nav-side nav-right">
      <nav class="nav-links">
        <a href="my-account.html">My Account</a>
        <a href="cart.html">Cart</a>
      </nav>
    </div>
  </header>

  <section class="content-page">
    <div class="content-wrap">
      <h1>Admin Products</h1>

      <div class="card dark" style="margin-bottom: 28px;">
        <form class="login-form" id="productForm">
          <input type="hidden" id="productId" />

          <input type="text" id="productName" placeholder="Product Name" required />
          <input type="number" step="0.01" id="productPrice" placeholder="Price" />
          <textarea id="productDescription" placeholder="Description" style="padding:14px 16px; min-height:120px;"></textarea>
          <input type="text" id="productSize" placeholder="Size" />
          <input type="number" id="productStock" placeholder="Stock" />
          <input type="text" id="productCategory" placeholder="Category (example: lanlan or lanlan,group)" />
          <input type="text" id="productStatus" placeholder="Status (active / draft / sold_out / hidden)" value="active" />
          <input type="text" id="productPurchaseMethod" placeholder="Purchase Method" />
          <input type="text" id="productPurchaseLink" placeholder="Purchase Link" />
          <input type="text" id="productYoutubeUrl" placeholder="YouTube URL" />
          <input type="text" id="productSlug" placeholder="Slug (optional)" />

          <label style="margin-top: 6px;">Cover Image Upload</label>
          <input type="file" id="coverFile" accept="image/*" />

          <label style="margin-top: 6px;">Additional Images Upload</label>
          <input type="file" id="galleryFiles" accept="image/*" multiple />

          <label style="margin-top: 6px;">Or paste image URLs JSON array</label>
          <textarea id="productImages" placeholder='["https://...jpg","https://...jpg"]' style="padding:14px 16px; min-height:100px;"></textarea>

          <button type="submit" id="saveProductButton">Save Product</button>
          <button type="button" id="resetFormButton">Reset Form</button>
        </form>

        <p id="adminMessage" style="margin-top:16px;"></p>
      </div>

      <div class="card light">
        <h2 style="margin-bottom:20px;">Existing Products</h2>
        <div id="adminProductsList">Loading...</div>
      </div>
    </div>
  </section>

</div>

<script type="module">
  import { supabase } from './supabase.js'
  import { getCurrentUser, getMyProfile } from './auth.js'
  import { normalizeImages, formatPrice } from './shop-data.js'

  const form = document.getElementById('productForm')
  const message = document.getElementById('adminMessage')
  const productsList = document.getElementById('adminProductsList')
  const resetFormButton = document.getElementById('resetFormButton')

  async function requireAdmin() {
    const user = await getCurrentUser()
    if (!user) {
      window.location.href = 'admin-login.html'
      return null
    }

    const profile = await getMyProfile()
    if (!profile || !['admin', 'owner'].includes(profile.role)) {
      message.textContent = 'You do not have admin access.'
      throw new Error('No admin access')
    }

    return { user, profile }
  }

  async function uploadImage(file) {
    const fileExt = file.name.split('.').pop()
    const fileName = `${crypto.randomUUID()}.${fileExt}`
    const filePath = `products/${fileName}`

    const { error } = await supabase.storage
      .from('images')
      .upload(filePath, file, {
        upsert: false
      })

    if (error) throw error

    const { data } = supabase.storage
      .from('images')
      .getPublicUrl(filePath)

    return data.publicUrl
  }

  async function uploadMultipleImages(fileList) {
    const files = Array.from(fileList || [])
    const urls = []

    for (const file of files) {
      const url = await uploadImage(file)
      urls.push(url)
    }

    return urls
  }

  function fillForm(product) {
    document.getElementById('productId').value = product.id || ''
    document.getElementById('productName').value = product.name || ''
    document.getElementById('productPrice').value = product.price ?? ''
    document.getElementById('productDescription').value = product.description || ''
    document.getElementById('productSize').value = product.size || ''
    document.getElementById('productStock').value = product.stock ?? ''
    document.getElementById('productCategory').value = product.category || ''
    document.getElementById('productStatus').value = product.status || 'active'
    document.getElementById('productPurchaseMethod').value = product.purchase_method || ''
    document.getElementById('productPurchaseLink').value = product.purchase_link || ''
    document.getElementById('productYoutubeUrl').value = product.youtube_url || ''
    document.getElementById('productSlug').value = product.slug || ''

    let imagesText = ''
    if (Array.isArray(product.images)) {
      imagesText = JSON.stringify(product.images, null, 2)
    } else if (typeof product.images === 'string') {
      imagesText = product.images
    }
    document.getElementById('productImages').value = imagesText

    window.scrollTo({ top: 0, behavior: 'smooth' })
  }

  function resetForm() {
    form.reset()
    document.getElementById('productId').value = ''
    document.getElementById('productStatus').value = 'active'
    document.getElementById('productImages').value = ''
    message.textContent = ''
  }

  async function loadProducts() {
    const { data, error } = await supabase
      .from('products')
      .select('*')
      .order('created_at', { ascending: false })

    if (error) {
      console.error(error)
      productsList.innerHTML = `<p>Failed to load products.</p><p>${error.message}</p>`
      return
    }

    if (!data || data.length === 0) {
      productsList.innerHTML = '<p>No products yet.</p>'
      return
    }

    productsList.innerHTML = data.map(product => `
      <div style="display:grid; grid-template-columns:120px 1fr auto; gap:18px; align-items:center; margin-bottom:18px; padding-bottom:18px; border-bottom:1px solid rgba(0,0,0,0.15);">
        <img src="${product.cover_image || 'https://via.placeholder.com/200'}" alt="${product.name || ''}" style="width:120px; height:120px; object-fit:cover; background:#ddd;">
        <div>
          <h3 style="margin-bottom:8px;">${product.name || ''}</h3>
          <p style="margin-bottom:6px;">${formatPrice(product.price)}</p>
          <p style="margin-bottom:6px;">Category: ${product.category || ''}</p>
          <p style="margin-bottom:6px;">Status: ${product.status || ''}</p>
          <p>ID: ${product.id}</p>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px;">
          <button class="edit-product-btn" data-id="${product.id}">Edit</button>
          <button class="delete-product-btn" data-id="${product.id}">Delete</button>
          <a href="product.html?id=${product.id}" target="_blank">Open</a>
        </div>
      </div>
    `).join('')

    bindAdminButtons(data)
  }

  function bindAdminButtons(products) {
    document.querySelectorAll('.edit-product-btn').forEach(button => {
      button.addEventListener('click', () => {
        const id = Number(button.getAttribute('data-id'))
        const product = products.find(item => Number(item.id) === id)
        if (product) fillForm(product)
      })
    })

    document.querySelectorAll('.delete-product-btn').forEach(button => {
      button.addEventListener('click', async () => {
        const id = Number(button.getAttribute('data-id'))
        const ok = window.confirm('Delete this product?')
        if (!ok) return

        try {
          const { error } = await supabase
            .from('products')
            .delete()
            .eq('id', id)

          if (error) throw error

          message.textContent = 'Product deleted.'
          await loadProducts()
        } catch (error) {
          console.error(error)
          message.textContent = error.message || 'Delete failed.'
        }
      })
    })
  }

  form.addEventListener('submit', async (event) => {
    event.preventDefault()
    message.textContent = ''

    try {
      await requireAdmin()

      const productId = document.getElementById('productId').value.trim()
      const name = document.getElementById('productName').value.trim()
      const price = document.getElementById('productPrice').value.trim()
      const description = document.getElementById('productDescription').value.trim()
      const size = document.getElementById('productSize').value.trim()
      const stock = document.getElementById('productStock').value.trim()
      const category = document.getElementById('productCategory').value.trim().toLowerCase()
      const status = document.getElementById('productStatus').value.trim().toLowerCase()
      const purchaseMethod = document.getElementById('productPurchaseMethod').value.trim()
      const purchaseLink = document.getElementById('productPurchaseLink').value.trim()
      const youtubeUrl = document.getElementById('productYoutubeUrl').value.trim()
      const slug = document.getElementById('productSlug').value.trim()

      const coverFile = document.getElementById('coverFile').files[0]
      const galleryFiles = document.getElementById('galleryFiles').files
      const imagesText = document.getElementById('productImages').value.trim()

      let coverImage = null
      let uploadedGalleryUrls = []

      if (coverFile) {
        coverImage = await uploadImage(coverFile)
      }

      if (galleryFiles && galleryFiles.length > 0) {
        uploadedGalleryUrls = await uploadMultipleImages(galleryFiles)
      }

      let parsedImages = []
      if (imagesText) {
        try {
          const parsed = JSON.parse(imagesText)
          if (Array.isArray(parsed)) {
            parsedImages = parsed
          }
        } catch {
          throw new Error('Images field must be valid JSON array.')
        }
      }

      const images = [...uploadedGalleryUrls, ...parsedImages]

      const payload = {
        name,
        price: price === '' ? null : Number(price),
        description,
        size,
        stock: stock === '' ? null : Number(stock),
        category,
        cover_image: coverImage || null,
        images,
        youtube_url: youtubeUrl || null,
        purchase_method: purchaseMethod || null,
        purchase_link: purchaseLink || null,
        status,
        slug: slug || null,
        theme: category.split(',')[0] || 'all',
        updated_at: new Date().toISOString()
      }

      if (!payload.cover_image && images.length > 0) {
        payload.cover_image = images[0]
      }

      if (productId) {
        const { data: oldProduct, error: oldError } = await supabase
          .from('products')
          .select('*')
          .eq('id', productId)
          .single()

        if (oldError) throw oldError

        if (!payload.cover_image) {
          payload.cover_image = oldProduct.cover_image || null
        }

        if ((!payload.images || payload.images.length === 0) && oldProduct.images) {
          payload.images = oldProduct.images
        }

        const { error } = await supabase
          .from('products')
          .update(payload)
          .eq('id', productId)

        if (error) throw error

        message.textContent = 'Product updated.'
      } else {
        const { error } = await supabase
          .from('products')
          .insert(payload)

        if (error) throw error

        message.textContent = 'Product created.'
      }

      resetForm()
      await loadProducts()
    } catch (error) {
      console.error(error)
      message.textContent = error.message || 'Save failed.'
    }
  })

  resetFormButton.addEventListener
