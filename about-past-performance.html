<script src="script.js"></script>

<script type="module">
  import { supabase } from './supabase.js'
  import { renderCartCount } from './cart.js'

  async function loadPastContent() {
    const { data, error } = await supabase
      .from('site_content')
      .select('*')
      .eq('page_key', 'about_past_performance')
      .maybeSingle()

    if (error || !data) return

    const extra = data.extra || {}

    document.getElementById('pastTitle').textContent = data.title || 'Past Performance'
    document.getElementById('pastBody').textContent = data.body || ''
    document.getElementById('pastVideo1').textContent = extra.video_1 || 'Video insert'
    document.getElementById('pastVideo2').textContent = extra.video_2 || 'Video insert'
  }

  loadPastContent()
  renderCartCount()
</script>
