<script src="script.js"></script>

<script type="module">
  import { supabase } from './supabase.js'

  function getProductId() {
    const params = new URLSearchParams(window.location.search)
    return params.get('id')
  }

  function normalizeImages(images, coverImage) {
    let imageList = []

    if (Array.isArray(images)) {
      imageList = images
    } else if (typeof images === 'string') {
      try {
        const parsed = JSON.parse(images)
        if (Array.isArray(parsed)) imageList = parsed
      } catch {
        imageList = []
      }
    }

    if (coverImage && !imageList.includes(coverImage)) {
      imageList.unshift(coverImage)
    }

    return imageList
  }

  function youtubeToEmbed(url) {
    if (!url) return null

    try {
      const parsed = new URL(url)

      if (parsed.hostname.includes('youtube.com')) {
        const id = parsed.searchParams.get('v')
        if (id) return `https://www.youtube.com/embed/${id}`
      }

      if (parsed.hostname.includes('youtu.be')) {
        const id = parsed.pathname.replace('/', '')
        if (id) return `https://www.youtube.com/embed/${id}`
      }

      return null
    } catch {
      return null
    }
  }

  async function loadProductDetail() {
    const productId = getProductId()
    const container = document.getElementById('productDetail')

    if (!productId) {
      container.innerHTML = '<h1>Product not found.</h1>'
      return
    }

    const { data, error } = await supabase
      .from('products')
      .select('*')
      .eq('id', productId)
      .single()

    if (error || !data) {
      console.error(error)
      container.innerHTML = '<h1>Failed to load product.</h1>'
      return
    }

    const images = normalizeImages(data.images, data.cover_image)
    const embedUrl = youtubeToEmbed(data.youtube_url)
    const priceText = data.price != null ? `$${data.price}` : ''
    const stockText = data.stock != null ? data.stock : ''
    const sizeText = data.size || ''
    const descText = data.description || ''
    const categoryText = data.category || ''
    const purchaseMethod = data.purchase_method || ''

    container.innerHTML = `
      <div class="product-detail-layout">
        <div class="product-detail-left">
          <img src="${images[0] || 'https://via.placeholder.com/700x700'}" alt="${data.name || ''}" class="product-detail-main-image">

          <div class="product-detail-gallery">
            ${images.map(url => `<img src="${url}" alt="" class="product-detail-thumb">`).join('')}
          </div>
        </div>

        <div class="product-detail-right">
          <h1>${data.name || ''}</h1>
          <p class="product-detail-price">${priceText}</p>
          <p><strong>Category:</strong> ${categoryText}</p>
          <p><strong>Size:</strong> ${sizeText}</p>
          <p><strong>Stock:</strong> ${stockText}</p>
          <p><strong>Description:</strong></p>
          <p>${descText}</p>
          <p><strong>Purchase:</strong> ${purchaseMethod}</p>

          ${embedUrl ? `
            <div class="product-video-wrap">
              <iframe
                src="${embedUrl}"
                title="Product video"
                frameborder="0"
                allowfullscreen>
              </iframe>
            </div>
          ` : ''}
        </div>
      </div>
    `
  }

  loadProductDetail()
</script>
